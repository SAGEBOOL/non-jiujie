<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coze Chat 测试页</title>
<style>
  body { font-family: -apple-system, sans-serif; background: #0A0A0A; color: #F5F5F0; padding: 40px; max-width: 600px; margin: 0 auto; }
  h1 { font-size: 20px; color: #FF2D20; }
  #status { padding: 12px 16px; border-radius: 8px; margin: 16px 0; font-size: 14px; }
  .ok { background: rgba(0,255,0,.1); border: 1px solid rgba(0,255,0,.3); color: #0f0; }
  .err { background: rgba(255,0,0,.1); border: 1px solid rgba(255,0,0,.3); color: #f00; }
  .info { background: rgba(0,245,255,.1); border: 1px solid rgba(0,245,255,.3); color: #00F5FF; }
  #response { background: #111; border: 1px solid #333; border-radius: 8px; padding: 16px; margin-top: 16px; white-space: pre-wrap; word-break: break-all; font-size: 13px; max-height: 400px; overflow-y: auto; }
  button { background: #FF2D20; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; }
  button:hover { background: #e0281a; }
  input { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px 16px; border-radius: 8px; font-size: 14px; width: 100%; margin: 8px 0; }
</style>
</head>
<body>
<h1>Coze Chat 接口测试</h1>
<div id="status" class="info">正在检查 Worker 健康状态...</div>
<input type="text" id="msg" value="你好，介绍一下九界归尘" placeholder="输入测试消息">
<button onclick="testChat()">发送测试</button>
<div id="response">等待测试...</div>

<script>
const PROXY_URL = 'https://coze.storylucas.top';
const statusEl = document.getElementById('status');
const responseEl = document.getElementById('response');

// 健康检查
fetch(PROXY_URL + '/health')
  .then(r => r.json())
  .then(d => { statusEl.className = 'ok'; statusEl.textContent = 'Worker 健康检查通过: ' + JSON.stringify(d); })
  .catch(e => { statusEl.className = 'err'; statusEl.textContent = 'Worker 不可达: ' + e.message; });

async function testChat() {
  const msg = document.getElementById('msg').value.trim();
  if (!msg) return;

  responseEl.textContent = '发送中...';

  try {
    const res = await fetch(PROXY_URL + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });

    if (!res.ok) {
      const errText = await res.text();
      responseEl.textContent = '错误 HTTP ' + res.status + '\n\n' + errText;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    let fullText = '';
    let currentEvent = '';
    let rawChunks = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      const chunk = decoder.decode(value, { stream: true });
      rawChunks += chunk;
      buffer += chunk;
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (line.startsWith('event:')) {
          currentEvent = line.slice(6).trim();
        } else if (line.startsWith('data:')) {
          const dataStr = line.slice(5).trim();
          if (!dataStr || dataStr === '[DONE]') continue;
          try {
            const data = JSON.parse(dataStr);
            if (currentEvent === 'conversation.message.delta' && data.content) {
              fullText += data.content;
              responseEl.textContent = '解析内容:\n' + fullText + '\n\n--- 原始SSE (前2000字) ---\n' + rawChunks.substring(0, 2000);
            }
          } catch (e) { /* skip */ }
        }
      }
    }

    if (!fullText) {
      responseEl.textContent = '未解析到回复内容\n\n--- 原始响应 ---\n' + rawChunks.substring(0, 3000);
    } else {
      responseEl.textContent = '解析内容:\n' + fullText + '\n\n--- 原始SSE (前2000字) ---\n' + rawChunks.substring(0, 2000);
    }
  } catch (err) {
    responseEl.textContent = '请求失败: ' + err.message;
  }
}
</script>
</body>
</html>
